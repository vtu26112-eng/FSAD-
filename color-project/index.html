<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Colour Pattern</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Simple Colour Pattern</h2>

    <div id="box">
        <p id="text">"Unity is strength"</p>
    </div>

    <div class="buttons">
        <h3>Foreground Color</h3>
        <button onclick="changeTextColor('red')">Red</button>
        <button onclick="changeTextColor('blue')">Blue</button>
        <button onclick="changeTextColor('green')">Green</button>

        <h3>Background Color</h3>
        <button onclick="changeBgColor('red')">Red</button>
        <button onclick="changeBgColor('yellow')">Yellow</button>
        <button onclick="changeBgColor('lightblue')">Blue</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
